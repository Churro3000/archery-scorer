<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a472a">
    <title>Archery Scorer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="nav-bar">
            <button class="nav-btn active" data-view="scan">📷 Scan</button>
            <button class="nav-btn" data-view="manual">✏️ Manual</button>
            <button class="nav-btn" data-view="results">📊 Results</button>
            <button class="nav-btn" data-view="export">📄 Export</button>
        </nav>

        <!-- Scan View -->
        <div id="scan-view" class="view active">
            <div class="scan-container">
                <div class="camera-container">
                    <video id="camera" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="camera-overlay">
                        <div class="scan-frame"></div>
                        <p class="scan-instruction">Align scorecard within frame</p>
                    </div>
                </div>
                <div class="camera-controls">
                    <button id="start-camera" class="btn btn-primary">📷 Start Camera</button>
                    <button id="capture" class="btn btn-success" style="display: none;">✅ Capture</button>
                    <button id="restart-scan" class="btn btn-warning" style="display: none;">🔄 Rescan</button>
                    <button id="stop-camera" class="btn btn-secondary" style="display: none;">❌ Stop</button>
                </div>
                <div id="processing-status" class="status-message" style="display: none;">
                    <div class="spinner"></div>
                    <p>Processing scorecard...</p>
                </div>
            </div>
        </div>

        <!-- Manual Entry View -->
        <div id="manual-view" class="view">
            <div class="form-container">
                <h2>Manual Entry</h2>
                <button id="new-manual-entry" class="btn btn-primary">+ New Entry</button>
            </div>
        </div>

        <!-- Score Entry Form (Scorecard Style) -->
        <div id="score-form" class="modal" style="display: none;">
            <div class="modal-content scorecard-style">
                <div class="modal-header">
                    <h3>Scorecard Entry</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="archer-form">
                    <!-- Archer Details -->
                    <div class="form-section archer-info">
                        <div class="form-group">
                            <label>NAME</label>
                            <input type="text" id="archer-name" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>CATEGORY</label>
                                <select id="category" required>
                                    <option value="">Select...</option>
                                    <option value="AAG">AAG</option>
                                    <option value="Seniors">Seniors</option>
                                    <option value="Juniors">Juniors</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>GENDER</label>
                                <select id="gender" required>
                                    <option value="">Select...</option>
                                    <option value="M">M</option>
                                    <option value="F">F</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>CLUB</label>
                                <select id="club" required>
                                    <option value="">Select...</option>
                                    <option value="Active">Active</option>
                                    <option value="Hogs">Hogs</option>
                                    <option value="Valley">Valley</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 10 METER Section -->
                    <div class="distance-section">
                        <h4 class="distance-title">10 METER</h4>
                        
                        <!-- Round 1 -->
                        <div class="round-section">
                            <label class="round-label">Section 1</label>
                            <div id="10m-r1" class="scorecard-grid"></div>
                        </div>
                        
                        <!-- Round 2 -->
                        <div class="round-section">
                            <label class="round-label">Section 2</label>
                            <div id="10m-r2" class="scorecard-grid"></div>
                        </div>
                        
                        <!-- Round 3 -->
                        <div class="round-section">
                            <label class="round-label">Section 3</label>
                            <div id="10m-r3" class="scorecard-grid"></div>
                        </div>
                        
                        <div class="section-total-display">10m Total: <span id="total-10m">0</span></div>
                    </div>

                    <!-- 15 METER Section -->
                    <div class="distance-section">
                        <h4 class="distance-title">15 METER</h4>
                        
                        <!-- Round 1 -->
                        <div class="round-section">
                            <label class="round-label">Section 1</label>
                            <div id="15m-r1" class="scorecard-grid"></div>
                        </div>
                        
                        <!-- Round 2 -->
                        <div class="round-section">
                            <label class="round-label">Section 2</label>
                            <div id="15m-r2" class="scorecard-grid"></div>
                        </div>
                        
                        <!-- Round 3 -->
                        <div class="round-section">
                            <label class="round-label">Section 3</label>
                            <div id="15m-r3" class="scorecard-grid"></div>
                        </div>
                        
                        <div class="section-total-display">15m Total: <span id="total-15m">0</span></div>
                    </div>

                    <!-- Grand Total -->
                    <div class="grand-total">
                        <strong>TOTAL SCORE: <span id="grand-total">0</span> / 300</strong>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary cancel-form">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Score</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results View -->
        <div id="results-view" class="view">
            <div class="results-container">
                <h2>Tournament Results</h2>
                <div class="results-controls">
                    <div class="filter-group">
                        <label>Category:</label>
                        <select id="filter-category">
                            <option value="all">All</option>
                            <option value="AAG">AAG</option>
                            <option value="Seniors">Seniors</option>
                            <option value="Juniors">Juniors</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Gender:</label>
                        <select id="filter-gender">
                            <option value="all">All</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Club:</label>
                        <select id="filter-club">
                            <option value="all">All</option>
                            <option value="Active">Active</option>
                            <option value="Hogs">Hogs</option>
                            <option value="Valley">Valley</option>
                        </select>
                    </div>
                </div>
                <div id="results-display">
                    <p class="no-results">No scores recorded yet. Start scanning or entering scores!</p>
                </div>
            </div>
        </div>

        <!-- Export View -->
        <div id="export-view" class="view">
            <div class="export-container">
                <h2>Export Results</h2>
                <div class="export-options">
                    <button id="generate-pdf" class="btn btn-primary">📄 Generate PDF Report</button>
                    <button id="sync-database" class="btn btn-success">☁️ Sync to Database</button>
                    <button id="export-csv" class="btn btn-secondary">📊 Export CSV</button>
                </div>
                <div id="sync-status" class="status-message" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="storage.js"></script>
    <script src="camera.js"></script>
    <script src="scoring.js"></script>
    <script src="results.js"></script>
    <script src="export.js"></script>
    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
